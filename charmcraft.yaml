type: charm
platforms:
  ubuntu@22.04:amd64:
  ubuntu@24.04:amd64:
  ubuntu@26.04:amd64:

parts:
  charm:
    source: .
    plugin: python
    build-packages:
      - python3-pip
    python-requirements:
      - requirements.txt
    override-build: |
      PIP_BREAK_SYSTEM_PACKAGES=1 PIP_NO_BINARY= python3 -m pip install --upgrade "pip>=22.3"
      craftctl default
