name: Integration Tests

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install charmcraft
        run: sudo snap install charmcraft --classic
      - name: Build charm
        run: |
          charmcraft pack -v --destructive-mode
          mv microk8s-ng*.charm microk8s-ng.charm
      - name: Upload charm
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: microk8s-ng.charm
          path: ./microk8s-ng.charm

  test-cluster:
    name: Cluster - ${{ matrix.control_plane}}cp${{ matrix.workers}}w - ${{ matrix.series }} - juju ${{ matrix.juju }}
    runs-on: ubuntu-latest
    needs: build
    strategy:
      # fail-fast: true
      matrix:
        control_plane: [1, 3]
        workers: [1]
        series: [jammy, noble, resolute]
        juju: [3.1]
    steps:
      - name: Checking out repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # - name: Setup tmate session
      #   uses: mxschmitt/action-tmate@c0afd6f790e3a5564914980036ebf83216678101 # v3
      - name: Configure pytest-operator
        uses: charmed-kubernetes/actions-operator@ea90ed489690bf3b1c1fcca6ac5f9edab70aecb0 # main
        with:
          provider: lxd
          lxd-channel: 5.0/stable
          juju-channel: ${{ matrix.juju }}/stable
      - name: Add user to lxd group
        run: sudo usermod -a -G lxd $USER
      - name: Fetch charm
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: microk8s-ng.charm
          path: build
      - name: Install tox
        run: |
          pip3 install tox
      - name: Run integration tests
        run: |
          juju add-model testing
          export MK8S_SERIES='${{ matrix.series }}'
          export MK8S_CLUSTER_SIZES='[[${{ matrix.control_plane }}, ${{ matrix.workers }}]]'
          export MK8S_CHARM=./build/microk8s-ng.charm
          export MK8S_CHARM_CHANNEL=''
          sg lxd -c 'tox -e integration-${{ matrix.juju }} -- --model testing -k test_microk8s_cluster'
      - name: Retrieve artifacts
        if: always()
        run: |
          mkdir artifacts
          juju debug-log -m testing --replay > artifacts/juju.log
          juju status -m testing --format yaml > artifacts/juju.yaml
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: Cluster - ${{ matrix.control_plane}}cp${{ matrix.workers}}w - ${{ matrix.series }} - juju ${{ matrix.juju }}
          path: artifacts/

